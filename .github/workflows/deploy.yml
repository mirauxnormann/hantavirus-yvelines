name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore Wrangler auth
        run: |
          mkdir -p ~/.wrangler/config
          echo "${{ secrets.CF_WRANGLER_CONFIG }}" | base64 -d > ~/.wrangler/config/default.toml

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy . --project-name hantavirus-yvelines --branch master --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
